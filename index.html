<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Interactive Buzzer Presentation</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: black;
    color: white;
    overflow-x: hidden;
}

/* Scroll snapping */
html {
    scroll-behavior: smooth;
    scroll-snap-type: y mandatory;
}

section {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 40px;
    scroll-snap-align: start;
    position: relative;
    z-index: 2;
}

/* Background canvas */
#bgCanvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 0;
}

/* Text */
h1 {
    font-size: 4rem;
    text-shadow: 0 0 20px #00d4ff;
}

h2 { color: #aaa; }

.highlight {
    color: #00d4ff;
}

/* Slide animation */
.animate {
    transform: scale(0.9);
    opacity: 0.4;
    transition: 0.6s;
}

.active {
    transform: scale(1);
    opacity: 1;
}

/* Background styles */
.dark { background: black; }
.blue { background: linear-gradient(135deg,#001f3f,#0074D9); }
.purple { background: linear-gradient(135deg,#2c003e,#8e44ad); }

/* Video */
video {
    width: 70%;
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(0,212,255,0.5);
}

/* Piano */
.piano {
    display: flex;
    margin-top: 30px;
}

.key {
    width: 50px;
    height: 180px;
    background: white;
    border: 1px solid black;
    cursor: pointer;
}

.key:active { background: #00d4ff; }

.black {
    width: 30px;
    height: 100px;
    background: black;
    margin-left: -15px;
    margin-right: -15px;
    z-index: 3;
    position: relative;
}
</style>
</head>

<body>

<canvas id="bgCanvas"></canvas>

<!-- Slide 1 -->
<section class="dark">
<h1>🎮 Interactive Buzzer Simulation</h1>
<h2>By Benjamin & Kfir</h2>
</section>

<!-- Slide 2 -->
<section class="blue">
<h1>It started with a question.</h1>
<p>Can we turn buzzers into something <span class="highlight">musical?</span></p>
</section>

<!-- Slide 3 -->
<section class="dark">
<h1>So we tried.</h1>
<p>We connected buzzers to Arduino.</p>
</section>

<!-- Slide 4 -->
<section class="purple">
<h1>Then… it worked.</h1>
<h2>“Clocks” – Coldplay</h2>
</section>

<!-- VIDEO -->
<section class="dark">
<h1>Watch the Process</h1>

<video controls>
<source src="clocks.mp4" type="video/mp4">
</video>

</section>

<!-- Piano Slide -->
<section class="blue">
<h1>Try the Piano 🎹</h1>

<div class="piano">
<div class="key" onclick="playNote(261.63)"></div>
<div class="key black" onclick="playNote(277.18)"></div>
<div class="key" onclick="playNote(293.66)"></div>
<div class="key black" onclick="playNote(311.13)"></div>
<div class="key" onclick="playNote(329.63)"></div>
<div class="key" onclick="playNote(349.23)"></div>
<div class="key black" onclick="playNote(369.99)"></div>
<div class="key" onclick="playNote(392.00)"></div>
</div>

</section>

<!-- Final -->
<section class="purple">
<h1>Thank You</h1>
</section>

<script>
// 🎹 AUDIO ENGINE
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playNote(freq, duration=0.4){
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.frequency.value = freq;
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();

    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+duration);

    osc.stop(audioCtx.currentTime+duration);
}

// 🧠 CLOCKS AUTO PLAY
function playClocks(){
    const melody = [
        329.63,392.00,440.00,
        329.63,392.00,440.00,
        293.66,349.23,392.00
    ];

    melody.forEach((n,i)=>{
        setTimeout(()=>playNote(n), i*300);
    });
}

// 🎬 SLIDE ANIMATION + TRIGGER
const sections = document.querySelectorAll("section");
let current = 0;

function showSlide(i){
    if(i<0 || i>=sections.length) return;
    current = i;
    sections[i].scrollIntoView({behavior:"smooth"});
}

// keyboard
document.addEventListener("keydown", e=>{
    if(e.key==="ArrowDown"||e.key==="ArrowRight") showSlide(current+1);
    if(e.key==="ArrowUp"||e.key==="ArrowLeft") showSlide(current-1);
});

// observer
const observer = new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
        if(entry.isIntersecting){
            entry.target.classList.add("active");

            if(entry.target.innerText.includes("Clocks")){
                playClocks();
            }
        }
    });
},{threshold:0.6});

sections.forEach(sec=>{
    sec.classList.add("animate");
    observer.observe(sec);
});

// 🌌 PARTICLES
const canvas = document.getElementById("bgCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles=[];

for(let i=0;i<80;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        z:Math.random()*1000
    });
}

function animate(){
    ctx.fillStyle="black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#00d4ff";

    particles.forEach(p=>{
        p.z-=2;
        if(p.z<=0) p.z=1000;

        let k=200/p.z;
        let x=(p.x-canvas.width/2)*k+canvas.width/2;
        let y=(p.y-canvas.height/2)*k+canvas.height/2;

        ctx.fillRect(x,y,2,2);
    });

    requestAnimationFrame(animate);
}
animate();

window.addEventListener("resize", ()=>{
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
});
</script>

</body>
</html>
