<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ESP32 Music Project</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: black;
    color: white;
    overflow: hidden;
}

.slide {
    position: absolute;
    width: 100%;
    height: 100vh;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
}

.slide.active {
    display: flex;
}

button {
    padding: 15px 25px;
    font-size: 18px;
    background: cyan;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="slide active">
    <h1>ESP32 Music Project</h1>
    <button onclick="startShow()">Start Presentation</button>
</div>

<div class="slide"><h1>The Idea</h1><p>We wanted to make real music with buzzers.</p></div>
<div class="slide"><h1>ESP32</h1><p>Better timing and performance than Arduino.</p></div>
<div class="slide"><h1>How it Works</h1><p>Each note = frequency sent to buzzer.</p></div>
<div class="slide"><h1>Playback</h1><p>Listen to the melody.</p></div>
<div class="slide"><h1>What's Next</h1><p>More songs and better sound.</p></div>
<div class="slide"><h1>Thank You</h1></div>

<script>
let slides = document.querySelectorAll(".slide");
let audioCtx;

/* SHOW SLIDE */
function showSlide(i) {
    slides.forEach(s => s.classList.remove("active"));
    slides[i].classList.add("active");
}

/* START */
function startShow() {
    console.log("CLICK WORKED"); // 👈 important test

    // create audio AFTER click
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    showSlide(1); // immediate change (so you SEE it works)

    let times = [3000, 6000, 9000, 12000, 15000];

    times.forEach((t, i) => {
        setTimeout(() => showSlide(i + 2), t);
    });

    // play sound
    setTimeout(playSound, 9000);
}

/* SOUND */
function playSound() {
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.frequency.value = 440;

    osc.start();
    osc.stop(audioCtx.currentTime + 1);
}
</script>

</body>
</html>
